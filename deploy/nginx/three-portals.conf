# Three-portal nginx (optional — or use 3 server blocks on different domains)

upstream isp_marketing { server 127.0.0.1:3000; }
upstream isp_admin     { server 127.0.0.1:3001; }
upstream isp_operator  { server 127.0.0.1:3002; }
upstream isp_socket    { server 127.0.0.1:3001; }

# Marketing — www.cyberlink.com
server {
    listen 80;
    server_name www.cyberlink.com cyberlink.com;

    location / {
        proxy_pass http://isp_marketing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Super Admin — admin.cyberlink.com
server {
    listen 80;
    server_name admin.cyberlink.com;

    location / {
        proxy_pass http://isp_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Operator + API + Socket.IO — app.cyberlink.com
server {
    listen 80;
    server_name app.cyberlink.com;

    location /socket.io/ {
        proxy_pass http://isp_socket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://isp_operator;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Single-IP fallback (ports in URL — no nginx required for dev/VPS IP access)
# Marketing: http://160.187.175.30:3000
# Admin:      http://160.187.175.30:3001
# Operator:   http://160.187.175.30:3002
