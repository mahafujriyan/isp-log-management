# ISP Log Server — Nginx reverse proxy
# Copy to: /etc/nginx/sites-available/logserver
# Enable:  sudo ln -s /etc/nginx/sites-available/logserver /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d yourdomain.com

upstream isp_logserver {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP → HTTPS (uncomment after certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://isp_logserver;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

