# ISP Log Server — VPS (160.187.175.30)
# sudo cp deploy/nginx/logserver.conf /etc/nginx/sites-available/isp-logserver
# sudo ln -sf /etc/nginx/sites-available/isp-logserver /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

upstream isp_nextjs {
    server 127.0.0.1:3002;
    keepalive 64;
}

upstream isp_socketio {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name 160.187.175.30 _;

    client_max_body_size 10m;

    # Socket.IO live log stream → syslog listener :3001
    location /socket.io/ {
        proxy_pass http://isp_socketio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Syslog listener health
    location /syslog-health {
        proxy_pass http://isp_socketio/;
        proxy_set_header Host $host;
    }

    # Next.js app
    location / {
        proxy_pass http://isp_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

