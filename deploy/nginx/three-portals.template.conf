# =============================================================================
# nginx — 3 Portal (domain template)
# 1. deploy/domains.env fill করুন
# 2. Replace YOUR-MARKETING-DOMAIN, YOUR-ADMIN-DOMAIN, YOUR-APP-DOMAIN
# 3. sudo cp ... → nginx -t → reload
# =============================================================================

upstream isp_marketing { server 127.0.0.1:3000; }
upstream isp_admin     { server 127.0.0.1:3001; }
upstream isp_operator  { server 127.0.0.1:3002; }
upstream isp_socket    { server 127.0.0.1:3001; }

# ── SECTION 1: Marketing ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR-MARKETING-DOMAIN www.YOUR-MARKETING-DOMAIN;

    location / {
        proxy_pass http://isp_marketing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── SECTION 2: Super Admin ──────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR-ADMIN-DOMAIN;

    location / {
        proxy_pass http://isp_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── SECTION 3: Operator + API + Socket.IO ───────────────────────────────────
server {
    listen 80;
    server_name YOUR-APP-DOMAIN;

    location /socket.io/ {
        proxy_pass http://isp_socket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://isp_operator;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
