# MikroTik remote syslog → dedicated ISP log file
# Install: sudo cp deploy/rsyslog/mikrotik.conf /etc/rsyslog.d/50-mikrotik.conf
#          sudo mkdir -p /var/log/mikrotik && sudo chown syslog:adm /var/log/mikrotik
#          sudo ufw allow 514/udp
#          sudo systemctl restart rsyslog

module(load="imudp")
input(type="imudp" port="514" address="0.0.0.0")

# Optional: separate high-volume NAT logs
$template MikroTikFormat,"%TIMESTAMP% %HOSTNAME% %syslogtag%%msg%\n"

if ($fromhost-ip != '127.0.0.1') then {
  action(
    type="omfile"
    file="/var/log/mikrotik/isp-syslog.log"
    template="MikroTikFormat"
    fileOwner="syslog"
    fileGroup="adm"
    fileCreateMode="0640"
    dirCreateMode="0755"
  )
  stop
}
